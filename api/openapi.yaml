openapi: 3.0.3
info:
  title: Enterprise Ledger API
  description: Core financial ledger API supporting idempotent transfers and atomic transactions.
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Local development server
paths:
  /transfer:
    post:
      summary: Execute a fund transfer
      operationId: executeTransfer
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferRequest'
      responses:
        '201':
          description: Transfer successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '200':
          description: Transfer already processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    TransferRequest:
      type: object
      required:
        - from_account
        - to_account
        - amount
      properties:
        from_account:
          type: string
          example: "acc_987654321"
        to_account:
          type: string
          example: "acc_123456789"
        amount:
          type: number
          format: double
          minimum: 0.01
          example: 250.50
    SuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: "success"
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "insufficient funds"
