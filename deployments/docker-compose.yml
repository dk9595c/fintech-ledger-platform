version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.api
    ports: ['8080:8080']
    environment:
      DATABASE_URL: postgres://ledger:securepass@db:5432/ledgerdb?sslmode=disable
      REDIS_ADDR: cache:6379
    depends_on: [db, cache]

  worker:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.worker
    environment:
      REDIS_ADDR: cache:6379
    depends_on: [cache]

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: securepass
      POSTGRES_DB: ledgerdb
    ports: ['5432:5432']

  cache:
    image: redis:7
    ports: ['6379:6379']
